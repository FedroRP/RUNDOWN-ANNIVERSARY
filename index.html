<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary Rundown ✨</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .font-pacifico { font-family: 'Pacifico', cursive; }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid #ffdeeb;
        }
        .cute-shadow { box-shadow: 0 8px 30px rgba(255, 182, 193, 0.3); }
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ffb6c1;
            border-radius: 2px;
        }
        .active-tab {
            background-color: #ffb6c1;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.5);
        }
        .loading-overlay {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
        }
        @keyframes heart-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .music-active { animation: heart-pulse 1.5s infinite; }

        /* Animasi Bunga Gugur */
        .flower {
            position: fixed;
            top: -50px;
            pointer-events: none;
            z-index: 99;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Global Loader -->
    <div id="loader" class="fixed inset-0 z-[100] loading-overlay flex flex-col items-center justify-center hidden">
        <div class="animate-bounce mb-4 text-pink-500">
            <i data-lucide="heart" class="fill-pink-500 w-12 h-12"></i>
        </div>
        <p class="text-pink-600 font-bold">Sinkronisasi Rencana...</p>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Warm-Memories-Emotional-Inspiring-Piano.mp3" type="audio/mpeg">
    </audio>

    <!-- Floating Buttons Container -->
    <div class="fixed bottom-6 left-6 z-50 flex flex-col gap-3">
        <!-- Tombol Bunga -->
        <button onclick="spawnFlowers()" class="glass-card p-4 rounded-full text-pink-500 shadow-xl border-2 border-pink-200 transition-all active:scale-95 group bg-white">
            <i data-lucide="flower-2" size="24"></i>
            <span class="absolute left-16 bottom-4 bg-pink-500 text-white text-xs px-3 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">
                Spam Bunga 🌸
            </span>
        </button>
        <!-- Tombol Musik -->
        <button onclick="toggleMusic()" id="musicBtn" class="glass-card p-4 rounded-full text-pink-500 shadow-xl border-2 border-pink-200 transition-all active:scale-95 group bg-white">
            <i data-lucide="music" id="musicIcon" size="24"></i>
            <span class="absolute left-16 bottom-4 bg-pink-500 text-white text-xs px-3 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">
                Putar Musik 🎶
            </span>
        </button>
    </div>

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl font-pacifico text-pink-500 mb-2">Anniversary Rundown</h1>
            <p class="text-pink-400 font-semibold italic">"Kita buat moment yang sangat indah dan berkesan" ✨</p>
        </header>

        <nav class="flex justify-center mb-8">
            <div class="glass-card p-1.5 rounded-2xl flex gap-2 cute-shadow">
                <button onclick="switchTab('timeline')" id="tab-timeline" class="active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2">
                    <i data-lucide="calendar-days" size="18"></i> Timeline
                </button>
                <button onclick="switchTab('summary')" id="tab-summary" class="text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50">
                    <i data-lucide="layout-list" size="18"></i> Summary
                </button>
            </div>
        </nav>

        <section id="inputFormCard" class="glass-card rounded-3xl p-6 mb-8 cute-shadow">
            <h2 class="text-xl font-bold text-pink-600 mb-4 flex items-center gap-2">
                <i data-lucide="sparkles" class="text-pink-500"></i> Buat Kenangan Baru
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="time" id="eventTime" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50">
                <input type="text" id="eventTitle" placeholder="Aktivitas Apa?" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50">
            </div>
            <textarea id="eventDesc" rows="2" placeholder="Catatan kecil atau lokasi..." class="mt-4 w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50"></textarea>
            <button onclick="saveEvent()" class="mt-4 w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-pink-200">
                <i data-lucide="cloud-upload" size="20"></i> Save
            </button>
        </section>

        <main>
            <div id="timelineView" class="relative timeline-line pl-12 space-y-6"></div>
            <div id="summaryView" class="hidden">
                <div class="glass-card rounded-3xl overflow-hidden cute-shadow">
                    <div class="bg-pink-400 p-4 text-white font-bold text-center">Summary Jadwal Kita</div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-pink-50 text-pink-600 border-b border-pink-100">
                                <tr>
                                    <th class="p-4 font-bold">Jam</th>
                                    <th class="p-4 font-bold">Aktivitas</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody" class="divide-y divide-pink-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="glass-card bg-white w-full max-w-md rounded-3xl p-6">
            <h2 class="text-xl font-bold text-pink-600 mb-4">Edit Rencana</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input type="time" id="editTime" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 bg-white">
                <input type="text" id="editTitle" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 bg-white">
                <textarea id="editDesc" rows="3" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 bg-white"></textarea>
                <div class="flex gap-2">
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-100 py-2 rounded-xl font-bold text-gray-500">Batal</button>
                    <button onclick="updateEvent()" class="flex-1 bg-pink-400 py-2 rounded-xl font-bold text-white">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxH13UHn1pu8UnGcCTcqvJVN76hpEy8Bbp8yllh87oEl-Ba-qWoHIFTZ33qWiFouJaOGQ/exec";
        
        let rundownData = [];
        let isMusicPlaying = false;

        // Daftar Ikon Lucu
        const cuteIcons = ['heart', 'star', 'smile', 'coffee', 'camera', 'music', 'cake', 'gift', 'pizza', 'utensils', 'car', 'map-pin', 'moon', 'sun', 'sparkles', 'candy', 'cookie'];

        const toggleLoader = (show) => document.getElementById('loader').classList.toggle('hidden', !show);

        function formatTime(timeStr) {
            if (!timeStr) return "";
            const str = timeStr.toString();
            if (str.includes('T')) {
                try {
                    const date = new Date(str);
                    const hours = date.getHours().toString().padStart(2, '0');
                    const minutes = date.getMinutes().toString().padStart(2, '0');
                    return `${hours}:${minutes}`;
                } catch (e) { return str; }
            }
            return str;
        }

        // Fungsi Animasi Bunga Gugur
        function spawnFlowers() {
            const flowerEmojis = ['🌸', '✨', '💖', '🌼', '🌷', '🎀'];
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.className = 'flower';
                    f.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    f.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    f.style.opacity = Math.random();
                    document.body.appendChild(f);
                    
                    // Hapus elemen setelah animasi selesai
                    setTimeout(() => f.remove(), 5000);
                }, i * 100);
            }
        }

        async function fetchEvents() {
            toggleLoader(true);
            try {
                const res = await fetch(SCRIPT_URL);
                rundownData = await res.json();
                render();
            } catch (e) { console.error(e); }
            finally { toggleLoader(false); }
        }

        async function saveEvent() {
            const time = document.getElementById('eventTime').value;
            const title = document.getElementById('eventTitle').value;
            const desc = document.getElementById('eventDesc').value;
            if (!time || !title) return alert("Jam dan Aktivitas diisi dulu ya sayang! ❤️");
            toggleLoader(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'add', data: { time, title, desc } })
                });
                document.getElementById('eventTime').value = '';
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventDesc').value = '';
                await fetchEvents();
                spawnFlowers(); // Rayakan penambahan baru dengan bunga
            } catch (e) { console.error(e); }
            finally { toggleLoader(false); }
        }

        async function updateEvent() {
            const id = document.getElementById('editId').value;
            const time = document.getElementById('editTime').value;
            const title = document.getElementById('editTitle').value;
            const desc = document.getElementById('editId').value ? document.getElementById('editDesc').value : '';
            
            // Re-find the specific element if values are missing for update
            const elementId = document.getElementById('editId').value;
            const elementTime = document.getElementById('editTime').value;
            const elementTitle = document.getElementById('editTitle').value;
            const elementDesc = document.getElementById('editDesc').value;

            toggleLoader(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'update', data: { id: elementId, time: elementTime, title: elementTitle, desc: elementDesc } })
                });
                closeEditModal();
                await fetchEvents();
            } catch (e) { console.error(e); }
            finally { toggleLoader(false); }
        }

        async function deleteEvent(id) {
            if (!confirm("Hapus rencana ini? 🥺")) return;
            toggleLoader(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', data: { id } })
                });
                await fetchEvents();
            } catch (e) { console.error(e); }
            finally { toggleLoader(false); }
        }

        function render() {
            rundownData.sort((a, b) => a.time.toString().localeCompare(b.time.toString()));
            const timeline = document.getElementById('timelineView');
            const table = document.getElementById('summaryTableBody');
            
            timeline.innerHTML = rundownData.length === 0 ? '<p class="ml-12 text-pink-300 italic">Belum ada rencana. Yuk isi bareng!</p>' : '';
            table.innerHTML = '';

            rundownData.forEach((item, index) => {
                const displayTime = formatTime(item.time);
                const iconName = cuteIcons[index % cuteIcons.length];
                
                const card = document.createElement('div');
                card.className = 'relative animate-fade-in-up';
                card.innerHTML = `
                    <div class="absolute -left-[44px] top-4 w-10 h-10 bg-pink-400 rounded-full flex items-center justify-center border-4 border-white shadow-md z-10 text-white">
                        <i data-lucide="${iconName}" size="16"></i>
                    </div>
                    <div class="glass-card rounded-2xl p-5 cute-shadow">
                        <div class="flex justify-between items-start">
                            <span class="text-pink-600 font-bold">${displayTime}</span>
                            <div class="flex gap-2">
                                <button onclick="openEditModal('${item.id}')" class="text-blue-400"><i data-lucide="pencil" size="14"></i></button>
                                <button onclick="deleteEvent('${item.id}')" class="text-red-400"><i data-lucide="trash-2" size="14"></i></button>
                            </div>
                        </div>
                        <h3 class="text-gray-800 font-bold text-lg">${item.title}</h3>
                        <p class="text-gray-500 text-sm">${item.desc || '-'}</p>
                    </div>
                `;
                timeline.appendChild(card);

                const row = document.createElement('tr');
                row.innerHTML = `<td class="p-4 font-bold text-pink-500">${displayTime}</td><td class="p-4">${item.title}</td>`;
                table.appendChild(row);
            });
            lucide.createIcons();
        }

        function openEditModal(id) {
            const item = rundownData.find(d => d.id === id);
            document.getElementById('editId').value = item.id;
            document.getElementById('editTime').value = formatTime(item.time);
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editDesc').value = item.desc || '';
            document.getElementById('editModal').classList.replace('hidden', 'flex');
        }

        function closeEditModal() { document.getElementById('editModal').classList.replace('flex', 'hidden'); }

        function switchTab(tab) {
            const isTimeline = tab === 'timeline';
            document.getElementById('tab-timeline').className = isTimeline ? 'active-tab px-6 py-2 rounded-xl font-bold flex items-center gap-2' : 'text-pink-400 px-6 py-2 rounded-xl font-bold flex items-center gap-2';
            document.getElementById('tab-summary').className = !isTimeline ? 'active-tab px-6 py-2 rounded-xl font-bold flex items-center gap-2' : 'text-pink-400 px-6 py-2 rounded-xl font-bold flex items-center gap-2';
            document.getElementById('timelineView').classList.toggle('hidden', !isTimeline);
            document.getElementById('inputFormCard').classList.toggle('hidden', !isTimeline);
            document.getElementById('summaryView').classList.toggle('hidden', isTimeline);
        }

        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const btn = document.getElementById('musicBtn');
            
            if (isMusicPlaying) {
                audio.pause();
                btn.classList.remove('music-active');
                isMusicPlaying = false;
            } else {
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        btn.classList.add('music-active');
                        isMusicPlaying = true;
                    }).catch(error => {
                        console.log("Playback interrupted or failed:", error);
                        isMusicPlaying = false;
                        btn.classList.remove('music-active');
                    });
                }
            }
        }

        window.onload = fetchEvents;
    </script>
</body>
</html>
