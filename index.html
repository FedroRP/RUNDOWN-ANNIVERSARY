<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Anniversary Rundown ✨</title>
    
    <!-- Ikon Hati -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%);
            min-height: 100vh;
        }
        .font-pacifico { font-family: 'Pacifico', cursive; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #ffdeeb;
        }
        .cute-shadow { box-shadow: 0 8px 30px rgba(255, 182, 193, 0.3); }
        .active-tab {
            background-color: #ffb6c1;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.5);
        }
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ffb6c1;
            border-radius: 2px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Musik Latar -->
    <audio id="bgMusic" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Warm-Memories-Emotional-Inspiring-Piano.mp3" type="audio/mpeg">
    </audio>

    <!-- Tombol Musik -->
    <button onclick="toggleMusic()" id="musicBtn" class="fixed bottom-6 left-6 z-50 glass-card p-4 rounded-full text-pink-500 shadow-xl border-2 border-pink-200 transition-all active:scale-95 group">
        <i data-lucide="music" id="musicIcon"></i>
        <div class="absolute -top-1 -right-1 w-3 h-3 bg-red-400 rounded-full hidden" id="musicPulse"></div>
    </button>

    <div class="max-w-2xl mx-auto">
        <!-- Judul -->
        <header class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl font-pacifico text-pink-500 mb-2">Anniversary Rundown</h1>
            <p class="text-pink-400 font-semibold italic text-sm">"Buat jadwalmu dan bagikan linknya! ✨"</p>
        </header>

        <!-- Navigasi Tab -->
        <nav class="flex justify-center mb-8">
            <div class="glass-card p-1.5 rounded-2xl flex gap-2 cute-shadow">
                <button onclick="switchTab('timeline')" id="tab-timeline" class="active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2">
                    <i data-lucide="calendar-days" size="18"></i> Timeline
                </button>
                <button onclick="switchTab('summary')" id="tab-summary" class="text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50">
                    <i data-lucide="layout-list" size="18"></i> Summary
                </button>
            </div>
        </nav>

        <!-- Form Input (Hanya di Tab Timeline) -->
        <section id="inputFormCard" class="glass-card rounded-3xl p-6 mb-8 cute-shadow">
            <h2 class="text-xl font-bold text-pink-600 mb-4 flex items-center gap-2">
                <i data-lucide="heart" class="fill-pink-500 text-pink-500"></i> Rencana Baru
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="time" id="eventTime" class="px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 outline-none">
                <input type="text" id="eventTitle" placeholder="Aktivitas Apa?" class="px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 outline-none">
            </div>
            <textarea id="eventDesc" rows="2" placeholder="Catatan tambahan..." class="w-full mt-4 px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 outline-none"></textarea>
            <button onclick="addEvent()" class="mt-4 w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-3 rounded-xl shadow-lg flex items-center justify-center gap-2">
                <i data-lucide="plus-circle" size="20"></i> Tambah ke Jadwal
            </button>
        </section>

        <!-- Tampilan Utama -->
        <main>
            <div id="timelineView" class="relative timeline-line pl-12 space-y-6"></div>
            
            <div id="summaryView" class="hidden">
                <div class="glass-card rounded-3xl overflow-hidden cute-shadow">
                    <div class="bg-pink-400 p-4 text-white font-bold text-center">Tabel Summary</div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-pink-50 text-pink-600 border-b border-pink-100">
                                <tr><th class="p-4">Jam</th><th class="p-4">Aktivitas</th><th class="p-4">Catatan</th></tr>
                            </thead>
                            <tbody id="summaryTableBody" class="divide-y divide-pink-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <!-- Tombol Bagikan -->
        <div class="mt-10 text-center">
            <button onclick="generateShareLink()" class="bg-white text-pink-500 border-2 border-pink-200 px-8 py-3 rounded-2xl font-bold hover:bg-pink-50 transition-all flex items-center gap-2 mx-auto cute-shadow">
                <i data-lucide="share-2" size="20"></i> Salin Link Berbagi
            </button>
            <p class="text-pink-300 text-xs mt-2 italic">Kirim link ini agar orang lain bisa melihat jadwalmu!</p>
        </div>
    </div>

    <!-- Modal Edit -->
    <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="glass-card bg-white w-full max-w-md rounded-3xl p-6">
            <h2 class="text-xl font-bold text-pink-600 mb-4">Edit Rencana</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input type="time" id="editTime" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100">
                <input type="text" id="editTitle" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100">
                <textarea id="editDesc" rows="3" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100"></textarea>
                <div class="flex gap-2">
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-200 py-2 rounded-xl font-bold">Batal</button>
                    <button onclick="updateEvent()" class="flex-1 bg-pink-400 py-2 rounded-xl font-bold text-white">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rundownData = [];

        // Inisialisasi: Cek apakah ada data di URL atau LocalStorage
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('d');

            if (dataParam) {
                try {
                    // Decode data dari URL
                    rundownData = JSON.parse(decodeURIComponent(escape(atob(dataParam))));
                } catch (e) {
                    console.error("Gagal memuat data dari link.");
                    loadFromLocal();
                }
            } else {
                loadFromLocal();
            }

            if (rundownData.length === 0) {
                rundownData = [{ id: '1', time: "19:00", title: "Contoh: Makan Malam ✨", desc: "Tempat favorit kita." }];
            }

            renderViews();
            lucide.createIcons();
        };

        function loadFromLocal() {
            const local = localStorage.getItem('ann_rundown');
            if (local) rundownData = JSON.parse(local);
        }

        function saveToLocal() {
            localStorage.setItem('ann_rundown', JSON.stringify(rundownData));
        }

        function renderViews() {
            rundownData.sort((a, b) => a.time.localeCompare(b.time));

            // Render Timeline
            const timeline = document.getElementById('timelineView');
            timeline.innerHTML = '';
            rundownData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'relative animate-fade-in-up';
                div.innerHTML = `
                    <div class="absolute -left-[44px] top-4 w-10 h-10 bg-pink-400 rounded-full flex items-center justify-center border-4 border-white shadow-md z-10"><i data-lucide="star" class="text-white fill-white" size="16"></i></div>
                    <div class="glass-card rounded-2xl p-5 cute-shadow">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-pink-600 font-bold text-lg">${item.time}</span>
                            <div class="flex gap-2">
                                <button onclick="openEditModal('${item.id}')" class="text-blue-400 p-1"><i data-lucide="pencil" size="16"></i></button>
                                <button onclick="deleteEvent('${item.id}')" class="text-red-400 p-1"><i data-lucide="trash-2" size="16"></i></button>
                            </div>
                        </div>
                        <h3 class="text-gray-800 font-bold text-xl">${item.title}</h3>
                        <p class="text-gray-500 text-sm italic">${item.desc || '-'}</p>
                    </div>`;
                timeline.appendChild(div);
            });

            // Render Table
            const table = document.getElementById('summaryTableBody');
            table.innerHTML = rundownData.map(item => `
                <tr class="hover:bg-pink-50">
                    <td class="p-4 font-bold text-pink-500">${item.time}</td>
                    <td class="p-4 font-bold">${item.title}</td>
                    <td class="p-4 text-xs text-gray-500 italic">${item.desc || '-'}</td>
                </tr>`).join('');
            
            lucide.createIcons();
            saveToLocal();
        }

        function addEvent() {
            const time = document.getElementById('eventTime').value;
            const title = document.getElementById('eventTitle').value;
            const desc = document.getElementById('eventDesc').value;
            if (!time || !title) return alert("Isi jam dan judul ya! ❤️");

            rundownData.push({ id: Date.now().toString(), time, title, desc });
            document.getElementById('eventTime').value = '';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDesc').value = '';
            renderViews();
        }

        function deleteEvent(id) {
            if (confirm("Hapus rencana ini?")) {
                rundownData = rundownData.filter(d => d.id !== id);
                renderViews();
            }
        }

        function openEditModal(id) {
            const item = rundownData.find(d => d.id === id);
            if (!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('editTime').value = item.time;
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editDesc').value = item.desc;
            document.getElementById('editModal').classList.replace('hidden', 'flex');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.replace('flex', 'hidden');
        }

        function updateEvent() {
            const id = document.getElementById('editId').value;
            const idx = rundownData.findIndex(d => d.id === id);
            if (idx !== -1) {
                rundownData[idx] = {
                    id,
                    time: document.getElementById('editTime').value,
                    title: document.getElementById('editTitle').value,
                    desc: document.getElementById('editDesc').value
                };
                closeEditModal();
                renderViews();
            }
        }

        function switchTab(tab) {
            const isTimeline = tab === 'timeline';
            document.getElementById('tab-timeline').className = isTimeline ? 'active-tab px-6 py-2 rounded-xl font-bold flex items-center gap-2' : 'text-pink-400 px-6 py-2 rounded-xl font-bold flex items-center gap-2';
            document.getElementById('tab-summary').className = !isTimeline ? 'active-tab px-6 py-2 rounded-xl font-bold flex items-center gap-2' : 'text-pink-400 px-6 py-2 rounded-xl font-bold flex items-center gap-2';
            document.getElementById('timelineView').classList.toggle('hidden', !isTimeline);
            document.getElementById('summaryView').classList.toggle('hidden', isTimeline);
            document.getElementById('inputFormCard').classList.toggle('hidden', !isTimeline);
        }

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const pulse = document.getElementById('musicPulse');
            if (music.paused) {
                music.play().then(() => pulse.classList.remove('hidden'));
            } else {
                music.pause();
                pulse.classList.add('hidden');
            }
        }

        // FUNGSI UTAMA UNTUK BERBAGI
        function generateShareLink() {
            const dataStr = JSON.stringify(rundownData);
            // Encode data ke Base64 (agar aman di URL)
            const encoded = btoa(unescape(encodeURIComponent(dataStr)));
            const shareUrl = window.location.origin + window.location.pathname + "?d=" + encoded;
            
            // Salin ke clipboard
            const el = document.createElement('textarea');
            el.value = shareUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            alert("Link berhasil disalin! Kirim link tersebut ke pasanganmu agar dia bisa melihat jadwal yang sama. ❤️");
        }
    </script>
</body>
</html>
