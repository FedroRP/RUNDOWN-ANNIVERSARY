<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplikasi Rundown Anniversary Bersama untuk merencanakan momen spesial.">
    <title>Our Special Anniversary Rundown ✨</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'anniversary-default';

        window.db = db;
        window.appId = appId;
        window.auth = auth;
        window.firestoreUtils = { collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, query };

        // Logika Autentikasi
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                startApp();
            }
        });
    </script>

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%);
            min-height: 100vh;
            scroll-behavior: smooth;
        }
        .font-pacifico { font-family: 'Pacifico', cursive; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #ffdeeb;
        }
        .cute-shadow { box-shadow: 0 8px 30px rgba(255, 182, 193, 0.3); }
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ffb6c1;
            border-radius: 2px;
        }
        .active-tab {
            background-color: #ffb6c1;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.5);
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.4s ease-out forwards; }
        @keyframes heart-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .music-active { animation: heart-pulse 1.5s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff5f5; }
        ::-webkit-scrollbar-thumb { background: #ffb6c1; border-radius: 10px; }

        #loadingOverlay {
            background: rgba(255, 245, 245, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .loading-heart { animation: heart-pulse 1s infinite; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Layar Loading -->
    <div id="loadingOverlay" class="fixed inset-0">
        <div class="loading-heart text-pink-400 mb-4">
            <i data-lucide="heart" size="64" class="fill-pink-400"></i>
        </div>
        <p class="text-pink-600 font-bold font-pacifico text-xl">Menyiapkan Momen Indah...</p>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Warm-Memories-Emotional-Inspiring-Piano.mp3" type="audio/mpeg">
    </audio>

    <!-- Tombol Musik -->
    <button onclick="toggleMusic()" id="musicBtn" class="fixed bottom-6 left-6 z-50 glass-card p-4 rounded-full text-pink-500 shadow-xl border-2 border-pink-200 transition-all active:scale-95 group">
        <i data-lucide="music" id="musicIcon" size="24"></i>
    </button>

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl font-pacifico text-pink-500 mb-2">Anniversary Rundown</h1>
            <p class="text-pink-400 font-semibold italic">"Setiap detik adalah kenangan bersama..." ✨</p>
            <div id="userCounter" class="text-[10px] text-pink-300 mt-2 opacity-50"></div>
        </header>

        <nav class="flex justify-center mb-8">
            <div class="glass-card p-1.5 rounded-2xl flex gap-2 cute-shadow">
                <button onclick="switchTab('timeline')" id="tab-timeline" class="active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2">
                    <i data-lucide="calendar-days" size="18"></i> Timeline
                </button>
                <button onclick="switchTab('summary')" id="tab-summary" class="text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50">
                    <i data-lucide="layout-list" size="18"></i> Summary
                </button>
            </div>
        </nav>

        <!-- Form Input -->
        <section id="inputFormCard" class="glass-card rounded-3xl p-6 mb-8 cute-shadow animate-fade-in-up">
            <h2 class="text-xl font-bold text-pink-600 mb-4 flex items-center gap-2">
                <i data-lucide="heart" class="fill-pink-500 text-pink-500"></i> Tambah Rencana Baru
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="eventTime" class="block text-sm font-bold text-pink-400 mb-1">Jam Berapa?</label>
                    <input type="time" id="eventTime" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 bg-white/50">
                </div>
                <div>
                    <label for="eventTitle" class="block text-sm font-bold text-pink-400 mb-1">Aktivitas Apa?</label>
                    <input type="text" id="eventTitle" placeholder="Contoh: Makan Malam" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 bg-white/50">
                </div>
            </div>
            <div class="mt-4">
                <label for="eventDesc" class="block text-sm font-bold text-pink-400 mb-1">Detail Tambahan</label>
                <textarea id="eventDesc" rows="2" placeholder="Catatan kecil..." class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 bg-white/50"></textarea>
            </div>
            <button onclick="saveEvent()" id="btnSave" class="mt-4 w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg">
                <i data-lucide="plus-circle" size="20"></i> Simpan ke Jadwal Bersama
            </button>
        </section>

        <main>
            <div id="timelineView" class="relative timeline-line pl-12 space-y-6"></div>

            <div id="summaryView" class="hidden animate-fade-in-up">
                <div class="glass-card rounded-3xl overflow-hidden cute-shadow">
                    <div class="bg-pink-400 p-4">
                        <h3 class="text-white font-bold text-center text-lg">Summary Rencana Kita ✨</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-pink-50 text-pink-600 border-b border-pink-100">
                                    <th class="p-4 font-bold">Jam</th>
                                    <th class="p-4 font-bold">Aktivitas</th>
                                    <th class="p-4 font-bold">Catatan</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody" class="divide-y divide-pink-50 text-gray-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Edit -->
    <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="glass-card bg-white w-full max-w-md rounded-3xl p-6">
            <h2 class="text-xl font-bold text-pink-600 mb-4">Edit Rencana</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input type="time" id="editTime" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100">
                <input type="text" id="editTitle" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100">
                <textarea id="editDesc" rows="3" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100"></textarea>
                <div class="flex gap-2">
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-100 py-2 rounded-xl font-bold text-gray-500">Batal</button>
                    <button onclick="updateEvent()" id="btnUpdate" class="flex-1 bg-pink-400 py-2 rounded-xl font-bold text-white shadow-md">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-6 right-6 glass-card px-6 py-3 rounded-2xl shadow-xl transform translate-x-[150%] transition-transform duration-500 z-[100] border-l-8 border-pink-400 font-bold text-pink-600">
        ✨ Perubahan Disimpan!
    </div>

    <script>
        let currentTab = 'timeline';
        let isMusicPlaying = false;
        let rundownData = [];
        let unsubscribe = null;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 3000);
        }

        async function startApp() {
            const { db, appId, firestoreUtils } = window;
            const eventsCol = firestoreUtils.collection(db, 'artifacts', appId, 'public', 'data', 'events');
            
            document.getElementById('userCounter').innerText = `ID Sesi: ${window.currentUser.uid}`;

            unsubscribe = firestoreUtils.onSnapshot(eventsCol, (snapshot) => {
                rundownData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderViews();
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, (error) => {
                console.error("Firestore error:", error);
                document.getElementById('loadingOverlay').classList.add('hidden');
            });
            
            lucide.createIcons();
        }

        function toggleMusic() {
            const bgMusic = document.getElementById('bgMusic');
            const musicBtn = document.getElementById('musicBtn');
            if (isMusicPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('music-active');
                isMusicPlaying = false;
            } else {
                bgMusic.play().then(() => {
                    musicBtn.classList.add('music-active');
                    isMusicPlaying = true;
                }).catch(() => alert("Klik layar sekali lagi untuk musik! ❤️"));
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            const timelineBtn = document.getElementById('tab-timeline');
            const summaryBtn = document.getElementById('tab-summary');
            const timelineView = document.getElementById('timelineView');
            const summaryView = document.getElementById('summaryView');
            const inputFormCard = document.getElementById('inputFormCard');

            if (tab === 'timeline') {
                timelineBtn.className = 'active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2';
                summaryBtn.className = 'text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50';
                timelineView.classList.remove('hidden');
                summaryView.classList.add('hidden');
                inputFormCard.classList.remove('hidden');
            } else {
                summaryBtn.className = 'active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2';
                timelineBtn.className = 'text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50';
                timelineView.classList.add('hidden');
                summaryView.classList.remove('hidden');
                inputFormCard.classList.add('hidden');
            }
            renderViews();
        }

        function renderViews() {
            rundownData.sort((a, b) => a.time.localeCompare(b.time));

            const timelineContainer = document.getElementById('timelineView');
            const tableBody = document.getElementById('summaryTableBody');
            
            timelineContainer.innerHTML = '';
            tableBody.innerHTML = '';

            if (rundownData.length === 0) {
                timelineContainer.innerHTML = `
                    <div class="bg-white/50 p-8 rounded-2xl text-center text-pink-300 border-2 border-dashed border-pink-200 ml-0">
                        <p>Belum ada jadwal bersama. Yuk mulai rencanakan!</p>
                    </div>
                `;
            }

            rundownData.forEach((item) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'relative animate-fade-in-up';
                itemEl.innerHTML = `
                    <div class="absolute -left-[44px] top-4 w-10 h-10 bg-pink-400 rounded-full flex items-center justify-center border-4 border-white shadow-md z-10">
                        <i data-lucide="star" class="text-white fill-white" size="16"></i>
                    </div>
                    <div class="glass-card rounded-2xl p-5 hover:translate-x-2 transition-transform duration-300 cute-shadow">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-pink-600 font-bold text-lg">${item.time}</span>
                            <div class="flex gap-2">
                                <button onclick="openEditModal('${item.id}')" class="text-blue-400 hover:text-blue-600 p-1"><i data-lucide="pencil" size="16"></i></button>
                                <button onclick="deleteEvent('${item.id}')" class="text-red-400 hover:text-red-600 p-1"><i data-lucide="trash-2" size="16"></i></button>
                            </div>
                        </div>
                        <h3 class="text-gray-800 font-bold text-xl mb-1">${item.title}</h3>
                        <p class="text-gray-500 text-sm italic">${item.desc || '-'}</p>
                    </div>
                `;
                timelineContainer.appendChild(itemEl);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="p-4 font-bold text-pink-500">${item.time}</td>
                    <td class="p-4 font-bold">${item.title}</td>
                    <td class="p-4 text-sm text-gray-500 italic">${item.desc || '-'}</td>
                `;
                tableBody.appendChild(row);
            });
            lucide.createIcons();
        }

        async function saveEvent() {
            const time = document.getElementById('eventTime').value;
            const title = document.getElementById('eventTitle').value;
            const desc = document.getElementById('eventDesc').value;
            if (!time || !title) return alert("Isi jam dan judul ya! ❤️");

            const { db, appId, firestoreUtils } = window;
            const eventsCol = firestoreUtils.collection(db, 'artifacts', appId, 'public', 'data', 'events');
            await firestoreUtils.addDoc(eventsCol, { time, title, desc, createdAt: Date.now() });
            
            document.getElementById('eventTime').value = '';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDesc').value = '';
            showToast("✨ Berhasil ditambahkan!");
        }

        async function deleteEvent(id) {
            if (!confirm("Hapus rencana ini? 🥺")) return;
            const { db, appId, firestoreUtils } = window;
            await firestoreUtils.deleteDoc(firestoreUtils.doc(db, 'artifacts', appId, 'public', 'data', 'events', id));
            showToast("🗑️ Rencana dihapus.");
        }

        function openEditModal(id) {
            const item = rundownData.find(d => d.id === id);
            if (!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('editTime').value = item.time;
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editDesc').value = item.desc;
            document.getElementById('editModal').classList.replace('hidden', 'flex');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.replace('flex', 'hidden');
        }

        async function updateEvent() {
            const id = document.getElementById('editId').value;
            const { db, appId, firestoreUtils } = window;
            await firestoreUtils.updateDoc(firestoreUtils.doc(db, 'artifacts', appId, 'public', 'data', 'events', id), {
                time: document.getElementById('editTime').value,
                title: document.getElementById('editTitle').value,
                desc: document.getElementById('editDesc').value
            });
            closeEditModal();
            showToast("✅ Jadwal diperbarui!");
        }
    </script>
</body>
</html>
