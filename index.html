<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Shared Anniversary ✨</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💝</text></svg>">

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #ffb6c1;
            --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: #4a4a4a;
        }

        .font-pacifico { font-family: 'Pacifico', cursive; }
        .font-dancing { font-family: 'Dancing Script', cursive; }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.2);
        }

        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--soft-pink), var(--primary-pink));
            border-radius: 10px;
        }

        .active-tab {
            background: var(--primary-pink);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.4);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .float-animation { animation: float 3s ease-in-out infinite; }

        .page-enter { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-pink);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <audio id="bgMusic" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Warm-Memories-Emotional-Inspiring-Piano.mp3" type="audio/mpeg">
    </audio>

    <div class="fixed bottom-6 left-6 z-50 flex flex-col gap-3">
        <button id="musicBtn" class="glass-card p-4 rounded-full text-pink-500 hover:scale-110 transition-all active:scale-95">
            <i data-lucide="music"></i>
        </button>
        <button id="confettiBtn" class="glass-card p-4 rounded-full text-yellow-500 hover:scale-110 transition-all active:scale-95">
            <i data-lucide="sparkles"></i>
        </button>
    </div>

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-10 page-enter">
            <div class="inline-block float-animation mb-4">
                <i data-lucide="heart" class="text-pink-500 fill-pink-400 w-12 h-12"></i>
            </div>
            <h1 class="text-5xl md:text-6xl font-pacifico text-pink-500 mb-4">Our Journey</h1>
            <p id="cloudStatus" class="text-pink-400 font-semibold flex items-center justify-center gap-2">
                <span class="loader"></span> Menghubungkan ke Cloud...
            </p>
        </header>

        <nav class="flex justify-center mb-10">
            <div class="glass-card p-1.5 rounded-2xl flex gap-2 shadow-sm">
                <button id="tab-timeline-btn" class="active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2">
                    <i data-lucide="calendar-heart" size="18"></i> Timeline
                </button>
                <button id="tab-summary-btn" class="text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50">
                    <i data-lucide="list-checks" size="18"></i> Ringkasan
                </button>
            </div>
        </nav>

        <section id="inputSection" class="glass-card rounded-3xl p-6 mb-10 page-enter">
            <h2 class="text-xl font-bold text-pink-600 mb-4 font-pacifico">Tambah Momen Baru ✨</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-4">
                    <input type="time" id="eventTime" class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50">
                    <input type="text" id="eventTitle" placeholder="Apa rencananya?" class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50">
                </div>
                <textarea id="eventDesc" placeholder="Catatan cinta..." class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50 resize-none h-[110px] md:h-auto"></textarea>
            </div>
            <button id="saveBtn" class="mt-6 w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-3 shadow-lg">
                <i data-lucide="heart"></i> Simpan ke Cloud
            </button>
        </section>

        <main>
            <div id="timelineView" class="relative timeline-line pl-12 space-y-8"></div>
            <div id="summaryView" class="hidden page-enter">
                <div class="glass-card rounded-3xl overflow-hidden">
                    <div class="bg-gradient-to-r from-pink-400 to-rose-400 p-6 text-white text-center font-pacifico text-2xl">Summary of Love</div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-pink-50/50 text-pink-600 border-b border-pink-100">
                                    <th class="p-4 font-bold text-xs uppercase">Waktu</th>
                                    <th class="p-4 font-bold text-xs uppercase">Aktivitas</th>
                                    <th class="p-4 font-bold text-xs uppercase">Detail</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody" class="divide-y divide-pink-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-20 text-center text-pink-300 pb-10">
            <p class="font-dancing text-2xl">Forever & Always yours,</p>
            <p class="text-xs mt-2 opacity-60 tracking-widest uppercase">Tersimpan Aman di Awan ❤️</p>
        </footer>
    </div>

    <!-- Modal Edit -->
    <div id="editModal" class="fixed inset-0 bg-pink-900/20 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
        <div class="glass-card bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-pacifico text-pink-600 mb-6">Ubah Rencana</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input type="time" id="editTime" class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100">
                <input type="text" id="editTitle" class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100">
                <textarea id="editDesc" rows="3" class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100 resize-none"></textarea>
                <div class="flex gap-3 pt-4">
                    <button id="cancelEditBtn" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold text-gray-500">Batal</button>
                    <button id="updateBtn" class="flex-1 bg-pink-400 py-3 rounded-2xl font-bold text-white">Update</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config (Disediakan otomatis oleh lingkungan)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'anniversary-app';

        let rundownData = [];
        let currentTab = 'timeline';

        // --- AUTH & INITIALIZATION ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
                document.getElementById('cloudStatus').innerHTML = "❌ Gagal Terhubung ke Cloud";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('cloudStatus').innerHTML = '<i data-lucide="cloud-check" class="text-green-500"></i> Terhubung & Tersinkronisasi';
                lucide.createIcons();
                listenToData();
            }
        });

        initAuth();

        // --- DATA SYNC (Firestore) ---
        const listenToData = () => {
            // Menggunakan path publik agar bisa dishare
            const dataRef = collection(db, 'artifacts', appId, 'public', 'data', 'rundown');
            
            onSnapshot(dataRef, (snapshot) => {
                rundownData = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                })).sort((a, b) => a.time.localeCompare(b.time));
                render();
            }, (error) => {
                console.error("Sync error:", error);
            });
        };

        // --- UI FUNCTIONS ---
        const render = () => {
            const timelineContainer = document.getElementById('timelineView');
            const tableBody = document.getElementById('summaryTableBody');
            
            timelineContainer.innerHTML = '';
            tableBody.innerHTML = '';

            if (rundownData.length === 0) {
                timelineContainer.innerHTML = `<div class="glass-card p-10 rounded-3xl text-center text-pink-300 border-dashed border-2 border-pink-100">Belum ada rencana tersimpan.</div>`;
            }

            rundownData.forEach((item, index) => {
                // Render Timeline
                const el = document.createElement('div');
                el.className = 'relative page-enter';
                el.innerHTML = `
                    <div class="absolute -left-[44px] top-4 w-10 h-10 bg-white rounded-full flex items-center justify-center border-4 border-pink-100 z-10 shadow-sm">
                        <i data-lucide="heart" class="text-pink-400 fill-pink-400" size="14"></i>
                    </div>
                    <div class="glass-card rounded-2xl p-6 border-l-4 border-l-pink-400">
                        <div class="flex justify-between items-start">
                            <span class="bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-sm font-bold">${item.time}</span>
                            <div class="flex gap-2">
                                <button data-id="${item.id}" class="edit-btn text-blue-400 hover:text-blue-600 p-1"><i data-lucide="pencil-line" size="18"></i></button>
                                <button data-id="${item.id}" class="delete-btn text-rose-400 hover:text-rose-600 p-1"><i data-lucide="trash-2" size="18"></i></button>
                            </div>
                        </div>
                        <h3 class="text-gray-800 font-bold text-xl mt-3 mb-1">${item.title}</h3>
                        <p class="text-gray-500 italic text-sm">${item.desc || '-'}</p>
                    </div>
                `;
                timelineContainer.appendChild(el);

                // Render Table
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="p-4 font-bold text-pink-500">${item.time}</td>
                    <td class="p-4 font-semibold text-gray-700">${item.title}</td>
                    <td class="p-4 text-sm text-gray-500 italic">${item.desc || '-'}</td>
                `;
                tableBody.appendChild(row);
            });

            // Re-bind events because of dynamic content
            document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = () => openEdit(btn.dataset.id));
            document.querySelectorAll('.delete-btn').forEach(btn => btn.onclick = () => deleteEvent(btn.dataset.id));
            lucide.createIcons();
        };

        // --- CRUD OPERATIONS ---
        window.saveEvent = async () => {
            if (!auth.currentUser) return;
            const time = document.getElementById('eventTime').value;
            const title = document.getElementById('eventTitle').value;
            const desc = document.getElementById('eventDesc').value;

            if (!time || !title) return alert("Jam dan Judul harus diisi!");

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="loader"></span> Menyimpan...';

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rundown'), {
                    time, title, desc, createdAt: Date.now()
                });
                document.getElementById('eventTime').value = '';
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventDesc').value = '';
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i data-lucide="heart"></i> Simpan ke Cloud';
                lucide.createIcons();
            }
        };

        window.deleteEvent = async (id) => {
            if (!auth.currentUser || !confirm("Hapus rencana ini?")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rundown', id));
        };

        const openEdit = (id) => {
            const item = rundownData.find(d => d.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('editTime').value = item.time;
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editDesc').value = item.desc;
            document.getElementById('editModal').classList.replace('hidden', 'flex');
        };

        window.updateEvent = async () => {
            const id = document.getElementById('editId').value;
            const data = {
                time: document.getElementById('editTime').value,
                title: document.getElementById('editTitle').value,
                desc: document.getElementById('editDesc').value
            };
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rundown', id), data);
            closeEditModal();
        };

        const closeEditModal = () => document.getElementById('editModal').classList.replace('flex', 'hidden');

        // --- EVENTS ---
        document.getElementById('saveBtn').onclick = window.saveEvent;
        document.getElementById('updateBtn').onclick = window.updateEvent;
        document.getElementById('cancelEditBtn').onclick = closeEditModal;
        
        document.getElementById('tab-timeline-btn').onclick = () => switchTab('timeline');
        document.getElementById('tab-summary-btn').onclick = () => switchTab('summary');

        const switchTab = (tab) => {
            const timelineBtn = document.getElementById('tab-timeline-btn');
            const summaryBtn = document.getElementById('tab-summary-btn');
            if (tab === 'timeline') {
                timelineBtn.className = 'active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2';
                summaryBtn.className = 'text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50';
                document.getElementById('timelineView').classList.remove('hidden');
                document.getElementById('inputSection').classList.remove('hidden');
                document.getElementById('summaryView').classList.add('hidden');
            } else {
                summaryBtn.className = 'active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2';
                timelineBtn.className = 'text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50';
                document.getElementById('timelineView').classList.add('hidden');
                document.getElementById('inputSection').classList.add('hidden');
                document.getElementById('summaryView').classList.remove('hidden');
            }
        };

        // Music & Confetti
        let isPlaying = false;
        document.getElementById('musicBtn').onclick = () => {
            const music = document.getElementById('bgMusic');
            if (isPlaying) music.pause(); else music.play();
            isPlaying = !isPlaying;
            document.getElementById('musicBtn').classList.toggle('animate-pulse');
        };

        document.getElementById('confettiBtn').onclick = () => {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 }, colors: ['#ff85a2', '#ffffff'] });
        };
    </script>
</body>
</html>
