<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Anniversary Rundown ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%);
            min-height: 100vh;
        }
        .font-pacifico {
            font-family: 'Pacifico', cursive;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #ffdeeb;
        }
        .cute-shadow {
            box-shadow: 0 8px 30px rgba(255, 182, 193, 0.3);
        }
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ffb6c1;
            border-radius: 2px;
        }
        .active-tab {
            background-color: #ffb6c1;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.5);
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.4s ease-out forwards;
        }
        /* Animasi berdenyut untuk tombol musik saat aktif */
        @keyframes heart-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .music-active {
            animation: heart-pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Audio Element (Selected Romantic Music) -->
    <audio id="bgMusic" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Warm-Memories-Emotional-Inspiring-Piano.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Toggle Button -->
    <button onclick="toggleMusic()" id="musicBtn" class="fixed bottom-6 left-6 z-50 glass-card p-4 rounded-full text-pink-500 shadow-xl border-2 border-pink-200 transition-all active:scale-95 group">
        <div id="musicIconContainer" class="relative">
            <i data-lucide="music" id="musicIcon" size="24"></i>
            <div class="absolute -top-1 -right-1 w-3 h-3 bg-red-400 rounded-full hidden" id="musicPulse"></div>
        </div>
        <span class="absolute left-16 bottom-4 bg-pink-500 text-white text-xs px-3 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">
            Klik untuk Musik Romantis ✨
        </span>
    </button>

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl font-pacifico text-pink-500 mb-2">Anniversary Rundown</h1>
            <p class="text-pink-400 font-semibold italic">"Membuat setiap detik menjadi kenangan indah..." ✨</p>
        </div>

        <!-- Tab Navigation -->
        <div class="flex justify-center mb-8">
            <div class="glass-card p-1.5 rounded-2xl flex gap-2 cute-shadow">
                <button onclick="switchTab('timeline')" id="tab-timeline" class="active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2">
                    <i data-lucide="calendar-days" size="18"></i>
                    Timeline
                </button>
                <button onclick="switchTab('summary')" id="tab-summary" class="text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50">
                    <i data-lucide="layout-list" size="18"></i>
                    Summary
                </button>
            </div>
        </div>

        <!-- Input Form Card -->
        <div id="inputFormCard" class="glass-card rounded-3xl p-6 mb-8 cute-shadow animate-fade-in-up">
            <h2 class="text-xl font-bold text-pink-600 mb-4 flex items-center gap-2">
                <i data-lucide="heart" class="fill-pink-500 text-pink-500"></i>
                Tambah Rencana Baru
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-pink-400 mb-1">Jam Berapa?</label>
                    <input type="time" id="eventTime" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-pink-400 mb-1">Aktivitas Apa?</label>
                    <input type="text" id="eventTitle" placeholder="Contoh: Makan Malam Romantis" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50">
                </div>
            </div>
            <div class="mt-4">
                <label class="block text-sm font-bold text-pink-400 mb-1">Detail Tambahan (Opsional)</label>
                <textarea id="eventDesc" rows="2" placeholder="Lokasi atau catatan kecil..." class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none bg-white/50"></textarea>
            </div>
            <button onclick="saveEvent()" id="saveBtn" class="mt-4 w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-pink-200">
                <i data-lucide="plus-circle" size="20"></i>
                Simpan ke Jadwal
            </button>
        </div>

        <!-- View Sections -->
        <div id="timelineView" class="relative timeline-line pl-12 space-y-6">
            <!-- Items will be injected here -->
        </div>

        <div id="summaryView" class="hidden animate-fade-in-up">
            <div class="glass-card rounded-3xl overflow-hidden cute-shadow">
                <div class="bg-pink-400 p-4">
                    <h3 class="text-white font-bold text-center text-lg flex items-center justify-center gap-2">
                        <i data-lucide="sparkles"></i> Summary Rencana Kita <i data-lucide="sparkles"></i>
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-pink-50 text-pink-600 border-b border-pink-100">
                                <th class="p-4 font-bold">Jam</th>
                                <th class="p-4 font-bold">Aktivitas</th>
                                <th class="p-4 font-bold">Catatan</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody" class="divide-y divide-pink-50 text-gray-700">
                            <!-- Table rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div id="summaryEmptyMsg" class="hidden mt-4 bg-white/50 p-8 rounded-2xl text-center text-pink-300 border-2 border-dashed border-pink-200">
                <p>Belum ada rencana untuk ditampilkan di tabel.</p>
            </div>
        </div>

        <!-- Floating Decoration -->
        <div class="fixed bottom-4 right-4 opacity-30 pointer-events-none">
            <i data-lucide="heart" class="text-pink-300 w-16 h-16 fill-pink-100"></i>
        </div>
    </div>

    <!-- Modal Edit -->
    <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="glass-card bg-white w-full max-w-md rounded-3xl p-6">
            <h2 class="text-xl font-bold text-pink-600 mb-4">Edit Rencana</h2>
            <input type="hidden" id="editIndex">
            <div class="space-y-4">
                <input type="time" id="editTime" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 bg-white">
                <input type="text" id="editTitle" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 bg-white">
                <textarea id="editDesc" rows="3" class="w-full px-4 py-2 rounded-xl border-2 border-pink-100 bg-white"></textarea>
                <div class="flex gap-2">
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-200 py-2 rounded-xl font-bold text-gray-600">Batal</button>
                    <button onclick="updateEvent()" class="flex-1 bg-pink-400 py-2 rounded-xl font-bold text-white shadow-md">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'timeline';
        let isMusicPlaying = false;
        let rundownData = JSON.parse(localStorage.getItem('anniversary_rundown')) || [
            { time: "10:00", title: "Pick Up Time! 🚗", desc: "Jemput di rumah pakai baju favorit." },
            { time: "12:00", title: "Lunch Date 🍝", desc: "Makan di tempat pertama kali kita ketemu." }
        ];

        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicPulse = document.getElementById('musicPulse');

        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('music-active');
                musicPulse.classList.add('hidden');
                isMusicPlaying = false;
            } else {
                bgMusic.play().catch(e => {
                    console.log("Gagal memutar audio:", e);
                    alert("Klik tombol ini lagi untuk memutar musik ya! ❤️");
                });
                musicBtn.classList.add('music-active');
                musicPulse.classList.remove('hidden');
                isMusicPlaying = true;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            const timelineBtn = document.getElementById('tab-timeline');
            const summaryBtn = document.getElementById('tab-summary');
            const timelineView = document.getElementById('timelineView');
            const summaryView = document.getElementById('summaryView');
            const inputFormCard = document.getElementById('inputFormCard');

            if (tab === 'timeline') {
                timelineBtn.className = 'active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2';
                summaryBtn.className = 'text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50';
                timelineView.classList.remove('hidden');
                summaryView.classList.add('hidden');
                inputFormCard.classList.remove('hidden');
            } else {
                summaryBtn.className = 'active-tab px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2';
                timelineBtn.className = 'text-pink-400 px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 hover:bg-pink-50';
                timelineView.classList.add('hidden');
                summaryView.classList.remove('hidden');
                inputFormCard.classList.add('hidden');
            }
            renderViews();
        }

        function renderViews() {
            rundownData.sort((a, b) => a.time.localeCompare(b.time));

            const timelineContainer = document.getElementById('timelineView');
            timelineContainer.innerHTML = '';

            if (rundownData.length === 0) {
                timelineContainer.innerHTML = `
                    <div class="bg-white/50 p-8 rounded-2xl text-center text-pink-300 border-2 border-dashed border-pink-200 ml-12 md:ml-0">
                        <p>Belum ada jadwal. Yuk tambah rencana serumu!</p>
                    </div>
                `;
                document.getElementById('summaryEmptyMsg').classList.remove('hidden');
            } else {
                document.getElementById('summaryEmptyMsg').classList.add('hidden');
            }

            rundownData.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'relative animate-fade-in-up';
                itemEl.innerHTML = `
                    <div class="absolute -left-[44px] top-4 w-10 h-10 bg-pink-400 rounded-full flex items-center justify-center border-4 border-white shadow-md z-10">
                        <i data-lucide="star" class="text-white fill-white" size="16"></i>
                    </div>
                    <div class="glass-card rounded-2xl p-5 hover:translate-x-2 transition-transform duration-300 cute-shadow">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-pink-600 font-bold text-lg">${item.time}</span>
                            <div class="flex gap-2">
                                <button onclick="openEditModal(${index})" class="text-blue-400 hover:text-blue-600 p-1">
                                    <i data-lucide="pencil" size="16"></i>
                                </button>
                                <button onclick="deleteEvent(${index})" class="text-red-400 hover:text-red-600 p-1">
                                    <i data-lucide="trash-2" size="16"></i>
                                </button>
                            </div>
                        </div>
                        <h3 class="text-gray-800 font-bold text-xl mb-1">${item.title}</h3>
                        <p class="text-gray-500 text-sm italic">${item.desc || '-'}</p>
                    </div>
                `;
                timelineContainer.appendChild(itemEl);
            });

            const tableBody = document.getElementById('summaryTableBody');
            tableBody.innerHTML = '';
            rundownData.forEach((item) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-pink-50/50 transition-colors';
                row.innerHTML = `
                    <td class="p-4 font-bold text-pink-500 whitespace-nowrap">${item.time}</td>
                    <td class="p-4 font-bold">${item.title}</td>
                    <td class="p-4 text-sm text-gray-500 italic">${item.desc || '-'}</td>
                `;
                tableBody.appendChild(row);
            });
            
            lucide.createIcons();
            saveToStorage();
        }

        function saveEvent() {
            const time = document.getElementById('eventTime').value;
            const title = document.getElementById('eventTitle').value;
            const desc = document.getElementById('eventDesc').value;

            if (!time || !title) {
                alert("Jam dan Judul harus diisi ya! ❤️");
                return;
            }

            rundownData.push({ time, title, desc });
            document.getElementById('eventTime').value = '';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDesc').value = '';
            
            renderViews();
        }

        function deleteEvent(index) {
            if (confirm("Hapus rencana ini? 🥺")) {
                rundownData.splice(index, 1);
                renderViews();
            }
        }

        function openEditModal(index) {
            const item = rundownData[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('editTime').value = item.time;
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editDesc').value = item.desc;
            
            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function updateEvent() {
            const index = document.getElementById('editIndex').value;
            const time = document.getElementById('editTime').value;
            const title = document.getElementById('editTitle').value;
            const desc = document.getElementById('editDesc').value;

            if (!time || !title) return;

            rundownData[index] = { time, title, desc };
            closeEditModal();
            renderViews();
        }

        function saveToStorage() {
            localStorage.setItem('anniversary_rundown', JSON.stringify(rundownData));
        }

        window.onload = () => {
            renderViews();
        };
    </script>
</body>
</html>
